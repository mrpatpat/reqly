name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  policy:
    name: Conventional Commit policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate pull request title
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: node scripts/verify-conventional-title.mjs

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test

  package:
    name: Package VS Code extension
    needs: [policy, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - id: metadata
        name: Read extension version
        shell: bash
        run: |
          version=$(node -p "require('./packages/vscode/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - run: npm run package:vscode
      - name: Name release artifact
        run: mv reqly.vsix "reqly-vscode-${{ steps.metadata.outputs.version }}.vsix"
      - uses: actions/upload-artifact@v7
        with:
          name: reqly-vscode-${{ steps.metadata.outputs.version }}
          path: reqly-vscode-${{ steps.metadata.outputs.version }}.vsix
          if-no-files-found: error
          retention-days: 14

  release:
    name: Automatic GitHub Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [policy, test, package]
    permissions:
      contents: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/release.yml
    secrets: inherit
