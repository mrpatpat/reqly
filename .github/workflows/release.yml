name: GitHub Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: github-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release VS Code extension
    runs-on: ubuntu-latest
    environment: github-release
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - run: npm ci
      - id: metadata
        name: Verify semantic version
        shell: bash
        run: echo "version=$(npm run --silent verify:release-version -- \"$GITHUB_REF_NAME\")" >> "$GITHUB_OUTPUT"
      - name: Require a commit from main
        shell: bash
        run: git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - run: npm run check
      - run: npm test
      - run: npm run package:vscode
      - name: Prepare release assets
        shell: bash
        run: |
          asset="reqly-vscode-${{ steps.metadata.outputs.version }}.vsix"
          mv reqly.vsix "$asset"
          sha256sum "$asset" > "$asset.sha256"
      - name: Attest VSIX provenance
        uses: actions/attest@v4
        with:
          subject-path: reqly-vscode-${{ steps.metadata.outputs.version }}.vsix
      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$GITHUB_REF_NAME"
          version="${{ steps.metadata.outputs.version }}"
          asset="reqly-vscode-${version}.vsix"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$asset" "$asset.sha256" --clobber
          else
            gh release create "$tag" "$asset" "$asset.sha256" --verify-tag --generate-notes --title "Reqly ${version}"
          fi
